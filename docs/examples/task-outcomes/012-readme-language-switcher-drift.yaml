  drift_violations_detected:
    - tests/test_readme_prompt_drift.py previously detected four language-switcher mismatches after README.zh-TW.md was added
  human_rework_minutes: 0
  reverted_files: []
  notes: The README prompt-drift test now discovers README*.md files, derives localized README coverage from the filesystem, parses the language switcher, and checks that every README links every other README while highlighting exactly one current language. This fixes the immediate Traditional Chinese switcher failure and removes the duplicated expected-switcher list that caused the drift. Sub-agent review flagged that set-only target comparison could miss duplicate switcher entries; the final test also asserts total entry and linked-target cardinality before the no-findings review pass.

follow_up:
