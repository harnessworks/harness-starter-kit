    - tests/test_readme_prompt_drift.py
    - docs/failures/0009-readme-language-switcher-drift-missed-traditional-chinese.md
    - docs/examples/task-outcomes/012-readme-language-switcher-drift.yaml
  wrong_file_edits: 0
  repeated_known_mistake: false
  verification_command: python3 -m unittest tests.test_readme_prompt_drift && python3 -m unittest discover -s tests && python3 -m py_compile scripts/apply_harness.py scripts/check_docs_drift.py scripts/check_structure.py scripts/check_encoding_hygiene.py scripts/check_effectiveness_plan.py scripts/check_failure_memory.py scripts/check_decision_memory.py scripts/harness_doctor.py && python3 scripts/check_docs_drift.py && python3 scripts/check_structure.py && python3 scripts/check_encoding_hygiene.py && python3 scripts/check_effectiveness_plan.py && python3 scripts/check_failure_memory.py && python3 scripts/check_decision_memory.py && python3 scripts/harness_doctor.py --target .
