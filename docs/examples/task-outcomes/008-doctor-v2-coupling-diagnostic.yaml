  repeated_known_mistake: false
  verification_command: python3 -m unittest discover -s tests && python3 -m py_compile scripts/apply_harness.py scripts/check_docs_drift.py scripts/check_structure.py scripts/check_encoding_hygiene.py scripts/check_effectiveness_plan.py scripts/check_failure_memory.py scripts/check_decision_memory.py scripts/harness_doctor.py && python3 scripts/check_docs_drift.py && python3 scripts/check_structure.py && python3 scripts/check_encoding_hygiene.py && python3 scripts/check_effectiveness_plan.py && python3 scripts/check_failure_memory.py && python3 scripts/check_decision_memory.py && python3 scripts/harness_doctor.py --target .
  first_pass_verification:
    result: failed_then_passed
  drift_violations_detected: []
  human_rework_minutes: 0
  reverted_files: []
  notes: Focused Doctor tests first failed because assertions still expected the old five-category output and because the initial detection-link heuristic did not recognize tests/test_*.py wording in an existing failure note. Sub-agent review then found that non-comparable task outcomes and illustrative effectiveness reports could suppress Unevaluated Memory, generic rubric/example mentions could count as feedback binding, unbound check scripts could inflate Feedback, Orphan Feedback detection was too narrow, and Proven status sounded proof-like. The implementation now keeps Proven unmeasured, separates included task outcomes and local effectiveness reports from maintenance/example evidence, narrows binding sources, prevents unbound scripts from counting as Feedback, reports unknown checks run without documented purpose, fixes the weak example label, and adds focused regression tests.

follow_up:
  harness_change_needed: false
  decision_or_failure_record: docs/decisions/0007-harness-doctor-six-element-coupling-diagnostic.md; no new failure record because the first-pass misses were implementation/test-contract adjustments from this run, not a recurring failed harness check after the new ADR.
  include_in_effectiveness_report: false
  include_in_comparable_product_task_count: false
