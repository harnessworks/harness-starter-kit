  repeated_known_mistake: false
  verification_command: python3 -m unittest discover -s tests && python3 -m py_compile scripts/apply_harness.py scripts/check_docs_drift.py scripts/check_structure.py scripts/check_encoding_hygiene.py scripts/check_effectiveness_plan.py scripts/check_failure_memory.py scripts/check_decision_memory.py scripts/harness_doctor.py && python3 scripts/check_docs_drift.py && python3 scripts/check_structure.py && python3 scripts/check_encoding_hygiene.py && python3 scripts/check_effectiveness_plan.py && python3 scripts/check_failure_memory.py && python3 scripts/check_decision_memory.py && python3 scripts/harness_doctor.py --target .
  first_pass_verification:
    result: failed_then_passed
  real_project_smoke_verification:
    result: passed
    environment:
      os: macOS 26.3 arm64
      java: OpenJDK 21.0.8
      go: /tmp/harness-real-smoke-cache/go1.26.4-darwin-arm64/go/bin/go
      maven: /tmp/harness-real-smoke-cache/apache-maven-3.9.9/bin/mvn
      gradle: /tmp/harness-real-smoke-cache/gradle-8.10.2/bin/gradle
      temp_workdir: /var/folders/8x/rl67drbj535ctbdjb7crv3_r0000gn/T/harness-real-smoke-rerun-jpmejhk1
    positive_cases:
      - real Go module ran `go test ./...` and both harness checkers accepted `go test ./...`.
      - real Spring Framework Maven project ran `mvn test` with `org.springframework:spring-context:6.1.14` and both harness checkers accepted `mvn test`.
      - real Spring Framework Gradle project ran `gradle test` with `org.springframework:spring-context:6.1.14` and both harness checkers accepted `gradle test`.
    negative_cases:
      - source-only Go project without `go.mod` was rejected for `go test ./...`.
      - Maven command without root `pom.xml` was rejected.
      - Gradle command without root build/settings file was rejected.
      - POSIX Maven wrapper command was rejected when only `mvnw.cmd` existed.
      - Windows Gradle wrapper command was rejected when only `gradlew` existed.
      - `tools\gradlew.bat test` was not treated as a root Gradle wrapper command.
  drift_violations_detected: []
  human_rework_minutes: 0
  reverted_files: []
  notes: First focused test run failed because the initial runner regex did not recognize Maven, Gradle, or Go commands as concrete checks. The regex argument tail was corrected. Review cycles then found missing full-validation evidence, source-only Go ambiguity, missing Windows wrapper cases, wrapper-flavor mismatch, case-sensitive validation gaps, Windows subpath false positives, and stale roadmap evidence wording. The implementation was tightened to require root go.mod for Go, require the matching wrapper file, use case-insensitive command validation, and exclude backslash subpaths from root wrapper matching before the final validation rerun. A later real-project smoke run created temporary Go and Spring Framework Maven/Gradle projects, ran their actual test commands, and confirmed the harness checkers accept valid command references and reject missing marker or wrapper mismatch references.

